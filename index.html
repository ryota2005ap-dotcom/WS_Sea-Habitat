<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラウド・バーチャルオーシャン</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Hiragino Maru Gothic Pro', 'Meiryo', sans-serif; overflow: hidden; touch-action: none; }
  .ocean-bg { background: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
  .scan-guide {
    position: absolute; inset: 0; border: 4px solid rgba(0, 255, 255, 0.5); border-radius: 12px; margin: 10px; pointer-events: none;
  }
  .scan-guide::after {
    content: "枠の中にさかなを入れてね"; position: absolute; bottom: 10px; left: 0; right: 0;
    text-align: center; color: rgba(255, 255, 255, 0.9); font-weight: bold; font-size: 14px; text-shadow: 1px 1px 3px #000;
  }
</style>
</head>
<body class="bg-slate-900 text-white w-screen h-screen">

  <!-- ==========================================
       1. モード選択画面
       ========================================== -->
  <div id="modeSelect" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900">
    <h1 class="text-2xl md:text-4xl font-bold mb-4 text-cyan-400 tracking-wider text-center">☁️ バーチャルオーシャン 🐠</h1>
    <p class="mb-10 text-slate-300 text-center px-4">スマホでスキャンした魚が、パソコンの海にワープするよ！</p>
    
    <div class="flex flex-col md:flex-row gap-6">
      <button id="btnScanner" class="px-10 py-10 bg-indigo-600 hover:bg-indigo-500 rounded-2xl flex flex-col items-center shadow-lg transition transform hover:scale-105 border-2 border-indigo-400">
        <span class="text-5xl mb-4">📱</span><span class="text-xl font-bold">スキャナーになる</span>
      </button>
      <button id="btnAquarium" class="px-10 py-10 bg-cyan-700 hover:bg-cyan-600 rounded-2xl flex flex-col items-center shadow-lg transition transform hover:scale-105 border-2 border-cyan-400">
        <span class="text-5xl mb-4">🖥️</span><span class="text-xl font-bold">水槽になる</span>
      </button>
    </div>
  </div>

  <!-- ==========================================
       2. スキャナーモード (スマホ側)
       ========================================== -->
  <div id="scannerUI" class="hidden absolute inset-0 z-40 bg-slate-900 flex flex-col items-center pt-6 overflow-y-auto">
    <h2 class="text-xl text-cyan-400 font-bold mb-2">さかなをカメラでスキャン！</h2>
    <p class="text-xs text-slate-300 mb-4 text-center px-2">※白い紙の上におき、明るい場所で撮ってね</p>
    
    <div class="relative w-72 h-72 rounded-xl overflow-hidden bg-white shadow-2xl shrink-0">
      <video id="cameraFeed" autoplay playsinline class="w-full h-full object-cover"></video>
      <div class="scan-guide"></div>
    </div>
    
    <button id="scanBtn" class="mt-6 px-8 py-4 bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold rounded-full text-xl shadow-[0_0_15px_rgba(245,158,11,0.5)] transform transition active:scale-95 shrink-0">
      ✨ スキャンして海へおくる！
    </button>

    <div id="toast" class="hidden mt-4 px-6 py-2 font-bold rounded-full transition-opacity shadow-lg text-sm shrink-0"></div>

    <!-- プレビュー表示エリア（透明になりすぎていないか確認用） -->
    <div id="previewArea" class="hidden mt-4 flex flex-col items-center shrink-0 pb-10">
      <span class="text-xs text-amber-300 mb-1">【おくられた画像】</span>
      <span class="text-[10px] text-slate-400 mb-2">※透明になった部分は黒く見えます。全部黒なら失敗です。</span>
      <img id="previewImg" class="w-24 h-24 bg-slate-800 border-2 border-slate-600 rounded-lg object-contain p-1" />
    </div>
  </div>

  <!-- ==========================================
       3. 水槽モード (パソコン側)
       ========================================== -->
  <div id="aquariumUI" class="hidden absolute inset-0 z-30 ocean-bg">
    <canvas id="oceanCanvas" class="w-full h-full block"></canvas>
    
    <div id="aqLoading" class="absolute top-4 left-4 flex flex-col gap-2 pointer-events-none">
      <div class="px-4 py-2 bg-black/50 rounded-full text-cyan-300 text-sm font-bold border border-cyan-500/30">
        🌐 クラウド接続準備中...
      </div>
    </div>

    <!-- 魚が到着したときのお知らせポップアップ -->
    <div id="aqToast" class="hidden absolute top-16 left-1/2 transform -translate-x-1/2 px-8 py-3 bg-gradient-to-r from-amber-400 to-orange-500 text-white font-bold rounded-full shadow-[0_0_20px_rgba(245,158,11,0.6)] z-50 text-lg transition-all duration-300">
      🐠 あたらしい魚がやってきた！
    </div>
  </div>

  <!-- ==========================================
       システム・通信スクリプト (Firebase連携)
       ========================================== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ⬇️⬇️⬇️ 【重要】Firebaseで取得したあなたのキーに書き換えてください ⬇️⬇️⬇️
    const firebaseConfig = {
  apiKey: "AIzaSyAPmHvYxVIK9lJpDShAQ1E1CyOe2ZkW4SM",
  authDomain: "virtual-ocean-499ad.firebaseapp.com",
  projectId: "virtual-ocean-499ad",
  storageBucket: "virtual-ocean-499ad.firebasestorage.app",
  messagingSenderId: "191336602534",
  appId: "1:191336602534:web:a93c1d794419d51aefcd67"
};

    // ⬆️⬆️⬆️ ここまで ⬆️⬆️⬆️

    let db, auth;
    let currentUser = null;
    let isFirebaseReady = false;

    try {
      if (firebaseConfig.apiKey === "ここを書き換える") {
        console.warn("⚠️ Firebaseキーが未設定です。");
      } else {
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        
        signInAnonymously(auth).catch(err => console.error("認証エラー:", err));

        onAuthStateChanged(auth, (user) => {
          currentUser = user;
          isFirebaseReady = true;
          if(user && currentMode === 'aquarium') startFirestoreListener();
        });
      }
    } catch(e) {
      console.error("Firebase初期化エラー:", e);
    }

    // --- 画面切り替え ---
    let currentMode = null;
    
    document.getElementById('btnScanner').addEventListener('click', () => {
      currentMode = 'scanner';
      document.getElementById('modeSelect').classList.add('hidden');
      document.getElementById('scannerUI').classList.remove('hidden');
      startCamera();
    });

    document.getElementById('btnAquarium').addEventListener('click', () => {
      currentMode = 'aquarium';
      document.getElementById('modeSelect').classList.add('hidden');
      document.getElementById('aquariumUI').classList.remove('hidden');
      initAquarium();
      if(isFirebaseReady && currentUser) startFirestoreListener();
    });

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `mt-4 px-6 py-2 font-bold rounded-full transition-opacity shadow-lg text-sm shrink-0 ${isError ? 'bg-red-500 text-white' : 'bg-green-500 text-white'}`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // --- スキャナー機能 ---
    const video = document.getElementById('cameraFeed');
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 640 } } });
        video.srcObject = stream;
      } catch (err) {
        showToast("カメラが見つかりません", true);
      }
    }

    function captureAndProcess() {
      const pCanvas = document.createElement('canvas');
      pCanvas.width = 300; pCanvas.height = 300; // 解像度を少しアップ
      const pctx = pCanvas.getContext('2d');
      const size = Math.min(video.videoWidth, video.videoHeight);
      const sx = (video.videoWidth - size) / 2;
      const sy = (video.videoHeight - size) / 2;
      pctx.drawImage(video, sx, sy, size, size, 0, 0, 300, 300);
      
      const imgData = pctx.getImageData(0, 0, 300, 300);
      const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        // ★調整: 背景の白を透明にする処理 (明るすぎる場合はここを調整)
        // RGBがすべて170以上なら透明にする
        if (data[i] > 170 && data[i+1] > 170 && data[i+2] > 170) {
          data[i+3] = 0; 
        }
      }
      pctx.putImageData(imgData, 0, 0);
      return pCanvas.toDataURL('image/png');
    }

    document.getElementById('scanBtn').addEventListener('click', async () => {
      if (!isFirebaseReady) {
        showToast("クラウドの鍵が未設定か、接続エラーです", true); return;
      }
      showToast("おくっています... 🚀");
      
      const base64Image = captureAndProcess();
      
      // ★追加: プレビュー画面の表示
      const previewImg = document.getElementById('previewImg');
      previewImg.src = base64Image;
      document.getElementById('previewArea').classList.remove('hidden');
      
      try {
        const dbCol = collection(db, 'my_ocean_fishes');
        await addDoc(dbCol, { image: base64Image, timestamp: Date.now() });
        showToast("海におくりました！ 🌊✨");
      } catch(e) {
        console.error(e);
        showToast("エラーがおきました", true);
      }
    });

    // --- 水槽機能 ---
    const canvas = document.getElementById('oceanCanvas');
    let ctx, w, h;
    let fishes = [];
    let seenDocs = new Set();
    let isFirstLoad = true; // 初回読み込みフラグ

    function initAquarium() {
      ctx = canvas.getContext('2d');
      function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
      window.addEventListener('resize', resize);
      resize();
      animateAquarium();
    }

    function showAquariumToast() {
      const aqToast = document.getElementById('aqToast');
      aqToast.classList.remove('hidden');
      // 少し上に浮き上がるアニメーション用
      aqToast.style.transform = 'translate(-50%, -10px)';
      
      setTimeout(() => {
        aqToast.classList.add('hidden');
        aqToast.style.transform = 'translate(-50%, 0)';
      }, 4000);
    }

    function startFirestoreListener() {
      const loadingEl = document.getElementById('aqLoading');
      if(loadingEl) loadingEl.innerHTML = '<div class="px-4 py-2 bg-green-500/50 rounded-full text-white text-sm font-bold border border-green-400">✅ クラウド接続OK。魚を待っています</div>';

      const dbCol = collection(db, 'my_ocean_fishes');
      onSnapshot(dbCol, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          if (change.type === 'added') {
            const docId = change.doc.id;
            if (!seenDocs.has(docId)) {
              seenDocs.add(docId);
              const data = change.doc.data();
              if (data.image) {
                const img = new Image();
                img.onload = () => {
                  fishes.push(new Fish(img));
                  // 初回読み込み（過去のデータの一斉読み込み）の時はトーストを出さない
                  if (!isFirstLoad) {
                    showAquariumToast();
                  }
                  
                  // ★追加: 魚が増えすぎたら古いものから消す（上限30匹）
                  if (fishes.length > 30) {
                    fishes.shift();
                  }
                };
                img.src = data.image;
              }
            }
          }
        });
        
        // 最初のデータの読み込みが終わったらフラグを折る
        if (isFirstLoad) {
          setTimeout(() => { isFirstLoad = false; }, 2000);
        }
      }, (error) => console.error("通信エラー:", error));
    }

    class Fish {
      constructor(image) {
        this.image = image;
        this.y = Math.random() * (h - 200) + 100;
        this.size = Math.random() * 0.5 + 0.5; // 大きさを調整
        
        this.direction = Math.random() > 0.5 ? 1 : -1;
        
        // ★修正: 画面の外からではなく、画面の端（すぐ見える位置）から出現させる
        this.x = this.direction === 1 ? 50 : w - 50;
        
        this.speedX = (Math.random() * 1.0 + 0.5) * this.direction;
        this.wobbleSpeed = Math.random() * 0.02 + 0.01;
        this.wobbleAmount = Math.random() * 0.8 + 0.2;
        this.wobbleTime = Math.random() * Math.PI * 2;
      }
      update() {
        this.x += this.speedX;
        this.wobbleTime += this.wobbleSpeed;
        this.y += Math.sin(this.wobbleTime) * this.wobbleAmount;
        // 画面の端まで行ったら、反対から出てくる
        if ((this.direction === 1 && this.x > w + 200) || (this.direction === -1 && this.x < -200)) {
          this.direction *= -1; this.speedX *= -1; this.y = Math.random() * (h - 200) + 100;
        }
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.direction === -1) ctx.scale(-1, 1); // 進行方向へ反転
        const drawSize = 250 * this.size;
        ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 5;
        ctx.drawImage(this.image, -drawSize/2, -drawSize/2, drawSize, drawSize);
        ctx.restore();
      }
    }

    const bubbles = Array.from({length: 40}, () => ({
      x: Math.random() * 2000, y: Math.random() * 2000, size: Math.random() * 4 + 1, speed: Math.random() * 0.5 + 0.2
    }));

    function animateAquarium() {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      bubbles.forEach(b => {
        let bx = b.x % w;
        ctx.beginPath(); ctx.arc(bx, b.y, b.size, 0, Math.PI * 2); ctx.fill();
        b.y -= b.speed;
        if (b.y < -10) { b.y = h + 10; b.x = Math.random() * w; }
      });
      fishes.forEach(fish => { fish.update(); fish.draw(); });
      requestAnimationFrame(animateAquarium);
    }
  </script>
</body>
</html>
