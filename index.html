<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラウド・バーチャルオーシャン</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Hiragino Maru Gothic Pro', 'Meiryo', sans-serif; overflow: hidden; touch-action: none; }
  
  /* ==========================================
     ★背景画像の設定はここ！
     ========================================== */
  .ocean-bg { 
    /* デフォルトのグラデーション背景 */
    background-color: #1a4a5e;
    
    /* AIで作った画像などを背景にしたい場合は、下の行の「/*」と「* /」を消して、
       URLの部分を画像のリンク（またはBase64データ）に書き換えてください。
    */
     background-image: url('blob:https://gemini.google.com/6b747f76-0c5f-4658-862a-ac56439627d2'); 
    
    background-size: cover;
    background-position: bottom;
    background-repeat: no-repeat;
  }

  .scan-guide {
    position: absolute; inset: 0; border: 4px solid rgba(0, 255, 255, 0.5); border-radius: 12px; margin: 10px; pointer-events: none;
  }
  .scan-guide::after {
    content: "枠の中にさかなを入れてね"; position: absolute; bottom: 10px; left: 0; right: 0;
    text-align: center; color: rgba(255, 255, 255, 0.9); font-weight: bold; font-size: 14px; text-shadow: 1px 1px 3px #000;
  }
  .debug-panel {
    position: absolute; top: 10px; left: 10px; z-index: 100;
    background: rgba(0,0,0,0.8); color: #0f0; padding: 10px;
    border-radius: 8px; font-family: monospace; font-size: 12px;
    width: 300px; max-height: 200px; overflow-y: auto;
    border: 1px solid #0f0; pointer-events: none;
  }
</style>
</head>
<body class="bg-slate-900 text-white w-screen h-screen">

  <!-- デバッグパネル -->
  <div id="debugLog" class="debug-panel"><div>[システム] 起動しました</div></div>

  <!-- 1. モード選択画面 -->
  <div id="modeSelect" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900">
    <h1 class="text-2xl md:text-4xl font-bold mb-4 text-cyan-400 tracking-wider text-center">☁️ バーチャルオーシャン 🐠</h1>
    <div class="flex flex-col md:flex-row gap-6 mt-10">
      <button id="btnScanner" class="px-10 py-10 bg-indigo-600 hover:bg-indigo-500 rounded-2xl flex flex-col items-center shadow-lg transition transform hover:scale-105 border-2 border-indigo-400">
        <span class="text-5xl mb-4">📱</span><span class="text-xl font-bold">スキャナーになる</span>
      </button>
      <button id="btnAquarium" class="px-10 py-10 bg-cyan-700 hover:bg-cyan-600 rounded-2xl flex flex-col items-center shadow-lg transition transform hover:scale-105 border-2 border-cyan-400">
        <span class="text-5xl mb-4">🖥️</span><span class="text-xl font-bold">水槽になる</span>
      </button>
    </div>
  </div>

  <!-- 2. スキャナーモード -->
  <div id="scannerUI" class="hidden absolute inset-0 z-40 bg-slate-900 flex flex-col items-center pt-16 overflow-y-auto">
    <div class="relative w-72 h-72 rounded-xl overflow-hidden bg-white shadow-2xl shrink-0">
      <video id="cameraFeed" autoplay playsinline class="w-full h-full object-cover"></video>
      <div class="scan-guide"></div>
    </div>
    <button id="scanBtn" class="mt-6 px-8 py-4 bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold rounded-full text-xl shadow-[0_0_15px_rgba(245,158,11,0.5)] transform transition active:scale-95 shrink-0">
      ✨ スキャンして海へおくる！
    </button>
    <div id="previewArea" class="hidden mt-4 flex flex-col items-center shrink-0 pb-10">
      <span class="text-xs text-amber-300 mb-1">【おくられた画像】</span>
      <img id="previewImg" class="w-24 h-24 bg-slate-800 border-2 border-slate-600 rounded-lg object-contain p-1" />
    </div>
  </div>

  <!-- 3. 水槽モード -->
  <div id="aquariumUI" class="hidden absolute inset-0 z-30 ocean-bg">
    <canvas id="oceanCanvas" class="w-full h-full block"></canvas>
    
    <!-- カウンター表示 -->
    <div class="absolute top-4 right-4 bg-black/60 px-5 py-3 rounded-2xl text-cyan-300 font-bold border border-cyan-500/50 shadow-lg backdrop-blur-sm">
      <div class="text-sm text-cyan-100">ただいまの海</div>
      <div class="text-2xl mt-1">
        <span id="speciesCount" class="text-yellow-400">0</span> <span class="text-sm">種類 /</span> 
        <span id="fishCount">0</span> <span class="text-sm">匹</span>
      </div>
    </div>

    <div id="aqToast" class="hidden absolute top-16 left-1/2 transform -translate-x-1/2 px-8 py-3 bg-gradient-to-r from-amber-400 to-orange-500 text-white font-bold rounded-full shadow-[0_0_20px_rgba(245,158,11,0.6)] z-50 text-lg transition-all duration-300">
      🐠 あたらしい魚がやってきた！
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    function logDebug(msg) {
      const logger = document.getElementById('debugLog');
      const time = new Date().toLocaleTimeString();
      logger.innerHTML += `<div>[${time}] ${msg}</div>`;
      logger.scrollTop = logger.scrollHeight;
    }

    // ⬇️⬇️⬇️ 【重要】Firebaseで取得したあなたのキーに書き換えてください ⬇️⬇️⬇️
    const firebaseConfig = {
  apiKey: "AIzaSyAPmHvYxVIK9lJpDShAQ1E1CyOe2ZkW4SM",
  authDomain: "virtual-ocean-499ad.firebaseapp.com",
  projectId: "virtual-ocean-499ad",
  storageBucket: "virtual-ocean-499ad.firebasestorage.app",
  messagingSenderId: "191336602534",
  appId: "1:191336602534:web:a93c1d794419d51aefcd67"
};

    // ⬆️⬆️⬆️ ここまで ⬆️⬆️⬆️

    let db, auth;
    let currentUser = null;
    let isFirebaseReady = false;

    try {
      if (firebaseConfig.apiKey === "ここを書き換える") {
        logDebug("⚠️ Firebaseキーが設定されていません。");
      } else {
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        
        signInAnonymously(auth).catch(err => logDebug(`❌ 認証エラー: ${err.message}`));
        onAuthStateChanged(auth, (user) => {
          if (user) {
            currentUser = user;
            isFirebaseReady = true;
            if(currentMode === 'aquarium') startFirestoreListener();
          }
        });
      }
    } catch(e) { logDebug(`❌ システムエラー: ${e.message}`); }

    let currentMode = null;
    document.getElementById('btnScanner').addEventListener('click', () => {
      currentMode = 'scanner';
      document.getElementById('modeSelect').classList.add('hidden');
      document.getElementById('scannerUI').classList.remove('hidden');
      startCamera();
    });

    document.getElementById('btnAquarium').addEventListener('click', () => {
      currentMode = 'aquarium';
      document.getElementById('modeSelect').classList.add('hidden');
      document.getElementById('aquariumUI').classList.remove('hidden');
      document.getElementById('debugLog').classList.add('hidden'); // 水槽モードではデバッグを隠す
      initAquarium();
      if(isFirebaseReady && currentUser) startFirestoreListener();
    });

    const video = document.getElementById('cameraFeed');
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 640 } } });
        video.srcObject = stream;
      } catch (err) { logDebug("❌ カメラ起動失敗"); }
    }

    function captureAndProcess() {
      const pCanvas = document.createElement('canvas');
      pCanvas.width = 300; pCanvas.height = 300;
      const pctx = pCanvas.getContext('2d');
      const size = Math.min(video.videoWidth, video.videoHeight);
      const sx = (video.videoWidth - size) / 2;
      const sy = (video.videoHeight - size) / 2;
      pctx.drawImage(video, sx, sy, size, size, 0, 0, 300, 300);
      
      const imgData = pctx.getImageData(0, 0, 300, 300);
      const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        if (data[i] > 170 && data[i+1] > 170 && data[i+2] > 170) { data[i+3] = 0; }
      }
      pctx.putImageData(imgData, 0, 0);
      return pCanvas.toDataURL('image/png');
    }

    document.getElementById('scanBtn').addEventListener('click', async () => {
      if (!isFirebaseReady) return;
      const base64Image = captureAndProcess();
      document.getElementById('previewImg').src = base64Image;
      document.getElementById('previewArea').classList.remove('hidden');
      try {
        const dbCol = collection(db, 'my_ocean_fishes');
        await addDoc(dbCol, { image: base64Image, timestamp: Date.now() });
      } catch(e) {}
    });

    const canvas = document.getElementById('oceanCanvas');
    let ctx, w, h;
    let fishes = [];
    let seenDocs = new Set();
    const MAX_FISHES = 60; // 子供が増えるので上限を少し増やす

    function initAquarium() {
      ctx = canvas.getContext('2d');
      function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
      window.addEventListener('resize', resize);
      resize();
      animateAquarium();
    }

    function startFirestoreListener() {
      const dbCol = collection(db, 'my_ocean_fishes');
      onSnapshot(dbCol, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          if (change.type === 'added') {
            const docId = change.doc.id;
            if (!seenDocs.has(docId)) {
              seenDocs.add(docId);
              const data = change.doc.data();
              if (data.image) {
                const img = new Image();
                img.onload = () => {
                  // スキャンされた魚には固有の「種別ID」を振る
                  const speciesId = 'species_' + docId;
                  fishes.push(new Fish(img, speciesId, 1, false));
                  
                  // ポップアップ表示
                  const aqToast = document.getElementById('aqToast');
                  aqToast.classList.remove('hidden');
                  setTimeout(() => aqToast.classList.add('hidden'), 4000);
                };
                img.src = data.image;
              }
            }
          }
        });
      });
    }

    // ==========================================
    // 多機能になった「魚」のクラス
    // ==========================================
    class Fish {
      constructor(image, speciesId, sizeRatio, isChild) {
        this.image = image;
        this.speciesId = speciesId; // 種類を判別するためのID
        this.isDead = false;
        
        // 誕生時間（寿命と出産タイミングの計算用）
        this.birthTime = Date.now();
        this.reproduceCount = 0;
        this.lastReproduceTime = this.birthTime;
        // 10秒〜20秒(10000〜20000ミリ秒)の間に最初の出産
        this.targetReproduceDelay = Math.random() * 10000 + 10000;
        
        // サイズ設定
        this.baseSize = Math.random() * 0.4 + 0.6; // スキャン元の基準サイズ
        this.size = this.baseSize * sizeRatio;     // 子供なら小さくなる

        // 配置と動き
        this.y = Math.random() * (h - 200) + 100;
        this.direction = Math.random() > 0.5 ? 1 : -1;
        this.x = isChild ? this.x : (this.direction === 1 ? -100 : w + 100);
        
        this.baseSpeedX = (Math.random() * 1.0 + 0.5);
        this.speedX = this.baseSpeedX * this.direction;
        
        // ゆらゆら
        this.wobbleSpeed = Math.random() * 0.02 + 0.01;
        this.wobbleAmount = Math.random() * 0.8 + 0.2;
        this.wobbleTime = Math.random() * Math.PI * 2;

        // アニメーション状態管理
        this.spinState = { active: false, axis: '', angle: 0 };
        this.dashState = { active: false, timer: 0, mult: 1 };
      }

      update() {
        let now = Date.now();

        // 1. 寿命チェック (3分 = 180,000ミリ秒)
        if (now - this.birthTime > 180000) {
          this.isDead = true;
          return;
        }

        // 2. 出産チェック
        if (this.reproduceCount === 0 && now - this.birthTime > this.targetReproduceDelay) {
          // 初回の出産
          this.reproduce(now);
        } else if (this.reproduceCount > 0 && Math.random() < 0.0005 && now - this.lastReproduceTime > 30000) {
          // 2回目以降は、前回から30秒以上経っていて、かつ超低確率
          this.reproduce(now);
        }

        // 3. 気まぐれな動き（ダッシュ・ストップ）
        if (!this.dashState.active && Math.random() < 0.005) {
          this.dashState.active = true;
          this.dashState.timer = Math.random() * 60 + 30; // 0.5〜1.5秒間
          let r = Math.random();
          if (r < 0.3) this.dashState.mult = 0;         // 急停止
          else if (r < 0.6) this.dashState.mult = 3;    // 急発進
          else this.dashState.mult = 0.5;               // 少し遅く
        }

        let currentSpeedX = this.speedX;
        if (this.dashState.active) {
          currentSpeedX = this.baseSpeedX * this.direction * this.dashState.mult;
          this.dashState.timer--;
          if (this.dashState.timer <= 0) this.dashState.active = false;
        }

        // 4. 回転アニメーションのトリガー
        if (!this.spinState.active && Math.random() < 0.003) {
          this.spinState.active = true;
          const axes = ['x', 'y', 'z'];
          this.spinState.axis = axes[Math.floor(Math.random() * 3)];
          this.spinState.angle = 0;
        }
        if (this.spinState.active) {
          this.spinState.angle += 0.15; // 回転スピード
          if (this.spinState.angle >= Math.PI * 2) {
            this.spinState.active = false;
            this.spinState.angle = 0;
          }
        }

        // 座標更新
        this.x += currentSpeedX;
        this.wobbleTime += this.wobbleSpeed;
        this.y += Math.sin(this.wobbleTime) * this.wobbleAmount;
        
        // 画面外ループ
        if ((this.direction === 1 && this.x > w + 200) || (this.direction === -1 && this.x < -200)) {
          this.direction *= -1; 
          this.speedX = this.baseSpeedX * this.direction; 
          this.y = Math.random() * (h - 200) + 100;
        }
      }

      // 出産メソッド
      reproduce(now) {
        this.reproduceCount++;
        this.lastReproduceTime = now;
        
        // 1〜5匹の子供
        let N = Math.floor(Math.random() * 5) + 1; 
        // 子供のサイズ計算 (1匹なら1/2倍、2匹なら1/3倍...)
        let childSizeRatio = 1 / (N + 1); 

        for (let i = 0; i < N; i++) {
          if (fishes.length >= MAX_FISHES) fishes.shift(); // 上限管理
          
          let child = new Fish(this.image, this.speciesId, childSizeRatio, true);
          // 親の周りに配置
          child.x = this.x + (Math.random() * 100 - 50);
          child.y = this.y + (Math.random() * 100 - 50);
          // 進行方向は親と同じにする
          child.direction = this.direction;
          child.speedX = child.baseSpeedX * child.direction;
          
          fishes.push(child);
        }
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // 3D風の回転処理
        if (this.spinState.active) {
          if (this.spinState.axis === 'z') {
            ctx.rotate(this.spinState.angle); // 通常の回転
          } else if (this.spinState.axis === 'y') {
            ctx.scale(Math.cos(this.spinState.angle), 1); // 横に潰れる(Y軸回転風)
          } else if (this.spinState.axis === 'x') {
            ctx.scale(1, Math.cos(this.spinState.angle)); // 縦に潰れる(X軸回転風)
          }
        }

        // 進行方向への反転
        if (this.direction === -1) ctx.scale(-1, 1); 
        
        const drawSize = 250 * this.size;
        ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 5;
        ctx.drawImage(this.image, -drawSize/2, -drawSize/2, drawSize, drawSize);
        ctx.restore();
      }
    }

    const bubbles = Array.from({length: 40}, () => ({
      x: Math.random() * 2000, y: Math.random() * 2000, size: Math.random() * 4 + 1, speed: Math.random() * 0.5 + 0.2
    }));

    function animateAquarium() {
      // もし背景画像を設定している場合、透明度のあるクリアではなく完全クリアにする
      ctx.clearRect(0, 0, w, h);
      
      // 泡
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      bubbles.forEach(b => {
        let bx = b.x % w;
        ctx.beginPath(); ctx.arc(bx, b.y, b.size, 0, Math.PI * 2); ctx.fill();
        b.y -= b.speed;
        if (b.y < -10) { b.y = h + 10; b.x = Math.random() * w; }
      });

      // 寿命(死んだ)魚を取り除きながら更新・描画
      fishes = fishes.filter(fish => !fish.isDead);
      fishes.forEach(fish => { fish.update(); fish.draw(); });

      // UIカウンターの更新
      document.getElementById('fishCount').innerText = fishes.length;
      
      // ユニークな「種類」の数を数える (Setを使って重複を省く)
      const uniqueSpecies = new Set(fishes.map(f => f.speciesId)).size;
      document.getElementById('speciesCount').innerText = uniqueSpecies;

      requestAnimationFrame(animateAquarium);
    }
  </script>
</body>
</html>
